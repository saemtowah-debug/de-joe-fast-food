<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>De Joe Fast Food - AEGIS Online Ordering System</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Top Role Portal Switcher Bar (AEGIS Spec) -->
  <header class="top-role-bar">
    <div class="role-bar-container">
      <div class="role-bar-label">
        <i class="fa-solid fa-layer-group"></i> <strong>AEGIS System Role Switcher:</strong>
      </div>
      <div class="role-buttons">
        <button class="portal-btn active" data-portal="customer" onclick="switchPortal('customer')">
          <i class="fa-solid fa-user"></i> Customer App
        </button>
        <button class="portal-btn" data-portal="vendor" onclick="switchPortal('vendor')">
          <i class="fa-solid fa-store"></i> Vendor Dashboard
        </button>
        <button class="portal-btn" data-portal="rider" onclick="switchPortal('rider')">
          <i class="fa-solid fa-motorcycle"></i> Rider Workspace
        </button>
      </div>
    </div>
  </header>

  <!-- Main Root Container Managed by JavaScript -->
  <main id="aegis-app-root">
    <!-- Rendered dynamically by app.js -->
  </main>

  <script src="app.js"></script>
</body>
</html>
